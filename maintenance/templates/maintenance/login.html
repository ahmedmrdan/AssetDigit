<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Assetdigit CMMS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 40px; width: 380px; }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo .brand { font-size: 24px; font-weight: 700; color: #fff; }
    .logo .brand span { color: #e94560; }
    .logo .sub { font-size: 12px; color: #64748b; margin-top: 4px; }
    h2 { font-size: 16px; font-weight: 600; color: #e2e8f0; margin-bottom: 20px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-group input { width: 100%; padding: 10px 13px; border: 1px solid #334155; border-radius: 8px; font-size: 14px; background: #0f172a; color: #e2e8f0; font-family: inherit; }
    .form-group input:focus { outline: none; border-color: #e94560; }
    .btn { width: 100%; padding: 11px; border-radius: 8px; background: #e94560; color: #fff; border: none; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 6px; }
    .btn:hover { background: #c73652; }
    .error { color: #f87171; font-size: 12px; margin-bottom: 12px; background: rgba(239,68,68,0.1); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(239,68,68,0.2); }
    .hint { text-align: center; font-size: 12px; color: #475569; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="brand">Asset<span>digit</span></div>
      <div class="sub">Asset Management & Maintenance System</div>
    </div>
    <h2>Sign in to continue</h2>
    {% if form.errors %}
    <div class="error">Invalid username or password. Please try again.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" placeholder="Enter username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" placeholder="Enter password">
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn">Sign In</button>
    </form>
    <div class="hint">Contact your administrator to reset your password.</div>
  </div>
</body>
</html>

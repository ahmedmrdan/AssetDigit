{% extends 'maintenance/base.html' %}
{% block title %}Close Permit{% endblock %}{% block page_title %}Close Safety Permit{% endblock %}
{% block content %}
<div class="page-actions"><h2>🏁 Close {{ permit.permit_number }}</h2><a href="{% url 'safety_permit_detail' permit.pk %}" class="btn">← Back</a></div>
<div class="card" style="max-width:640px"><div class="card-body"><form method="post">{% csrf_token %}
  <div class="form-group"><label>Closed By *</label>{{ form.closed_by }}</div>
  <div class="form-group"><label>Site Cleared / Closure Notes</label>{{ form.closure_notes }}</div>
  <div style="display:flex;gap:10px;margin-top:8px">
    <button type="submit" class="btn" style="background:#16a34a;color:#fff;border-color:#16a34a">🏁 Close Permit</button>
    <a href="{% url 'safety_permit_detail' permit.pk %}" class="btn">Cancel</a>
  </div>
</form></div></div>
{% endblock %}
